      // ГўвЂќв‚¬ГўвЂќв‚¬ Floor ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬

      floor.rotation.x = -Math.PI / 2;
      floor.receiveShadow = true;
      scene.add(floor);

      const grid = new THREE.GridHelper(ARENA * 2, 18, 0x19304a, 0x0c1e2e);
      grid.position.y = 0.012;
      scene.add(grid);

     
      const wallMat = new THREE.MeshStandardMaterial({ color: 0x1c3e5c, roughness: 0.55, metalness: 0.35 });
      [
        { x: 0,      z: -ARENA, lx: ARENA * 2, lz: 0.5 },
        { x: 0,      z:  ARENA, lx: ARENA * 2, lz: 0.5 },
        { x: -ARENA, z: 0,      lx: 0.5,       lz: ARENA * 2 },
        { x:  ARENA, z: 0,      lx: 0.5,       lz: ARENA * 2 },
      ].forEach(({ x, z, lx, lz }) => {

        wall.castShadow = true;
        scene.add(wall);
      });

        { x:  3, z:  3, angle: -Math.PI * 0.25 },
      ];

      function makeCar(ci) {
        const g = new THREE.Group();
        // Body
        const body = new THREE.Mesh(
          new THREE.BoxGeometry(0.65, 0.28, 1.1),
          new THREE.MeshStandardMaterial({
            color: PLAYER_COLORS[ci],
            emissive: PLAYER_EMISSIVE[ci],
            emissiveIntensity: 0.55,
            roughness: 0.32,
            metalness: 0.45,
          })
        );
        body.castShadow = true;
        g.add(body);
        // Cockpit
        const cockpit = new THREE.Mesh(
          new THREE.BoxGeometry(0.37, 0.21, 0.44),
          new THREE.MeshStandardMaterial({ color: 0x04101c, roughness: 0.5 })
        );
        cockpit.position.set(0, 0.24, -0.08);
        g.add(cockpit);
        g.visible = false;
        return g;
      }

      const players = startPos.map((pos, i) => ({
        x: pos.x, z: pos.z, angle: pos.angle,
        speed: 0,
        input: { dx: 0, dy: 0, btnA: false, btnB: false, btnC: false, btnD: false },
        active: false,
        mesh: makeCar(i),
      }));

      players.forEach((p) => {
        p.mesh.position.set(p.x, 0.2, p.z);
        p.mesh.rotation.y = p.angle;
        scene.add(p.mesh);
      });

      
      function updatePills(playerList) {
        playerList.forEach(({ slot, connected }) => {
          document.getElementById(`pill${slot}`)?.classList.toggle("active", connected);
        });
      }

      
      let socket, roomId;
      let hudVisible = true;

      hudToggleBtn.addEventListener("click", () => {
        hudVisible = !hudVisible;
        hud.classList.toggle("is-hidden", !hudVisible);
        hudToggleBtn.textContent = hudVisible ? "Ocultar panel" : "Mostrar panel";
      });

      async function setupSession() {
        const res  = await fetch("/api/create-session");
        const data = await res.json();
        roomId = data.roomId;
        roomCodeEl.textContent = roomId;
        qrImage.src = data.qrDataUrl;
        dlog("session creada", { roomId, phoneUrl: data.phoneUrl });

        const wsProto = location.protocol === "https:" ? "wss" : "ws";
        socket = new WebSocket(`${wsProto}://${location.host}`);

        socket.addEventListener("open", () => {
          dlog("ws open", { roomId });
          socket.send(JSON.stringify({ type: "join", role: "pc", roomId }));
          dlog("join pc enviado", { roomId });
        });

        socket.addEventListener("message", (event) => {
          const msg = JSON.parse(event.data);
          if (msg.type !== "input") {
            dlog("ws message", msg.type, msg);
          }

          if (msg.type === "room-status") {
            const count = msg.players.filter((p) => p.connected).length;
            connectionStatus.textContent = count
              ? `${count} jugador${count > 1 ? "es" : ""} conectado${count > 1 ? "s" : ""}. Escanea el QR para unirte.`
              : "Esperando jugadoresвЂ¦ Escanea el QR con el movil.";
            msg.players.forEach(({ slot, connected }) => {
              players[slot].active = connected;
              players[slot].mesh.visible = connected;
              if (!connected) players[slot].speed = 0;
            });
            updatePills(msg.players);
          }

          if (msg.type === "input") {
            const p = players[msg.playerSlot];
            if (p) {
              const btnA = Boolean(msg.btnA ?? msg.btn1);
              const btnB = Boolean(msg.btnB ?? msg.btn2);
              p.input = {
                dx: msg.dx,
                dy: msg.dy,
                btnA,
                btnB,
                btnC: msg.btnC,
                btnD: msg.btnD,
              };

              const state = `dx:${Number(msg.dx || 0).toFixed(2)} A:${btnA} B:${btnB} C:${Boolean(msg.btnC)} D:${Boolean(msg.btnD)}`;
              if (inputStateByPlayer[msg.playerSlot] !== state) {
                inputStateByPlayer[msg.playerSlot] = state;
                dlog(`input J${msg.playerSlot + 1}`, state);
              }
            }
          }
        });

        socket.addEventListener("close", () => {
          dlog("ws close", { roomId });
          connectionStatus.textContent = "Conexion cerrada. Recarga la pГЎgina.";
        });

        socket.addEventListener("error", (err) => {
          dlog("ws error", err?.message || "transport error");
        });
      }

      // ГўвЂќв‚¬ГўвЂќв‚¬ Physics ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬
      function updatePlayer(p, dt) {
        if (!p.active) return;
        const { dx, btnA, btnB, btnC, btnD } = p.input;

        if (btnB) {
          p.speed *= 0.55;
          if (Math.abs(p.speed) < 0.15) p.speed = 0;
        } else {
          let target = 0;
          if (btnA) target += MAX_SPEED;
          if (btnC) target -= MAX_SPEED * 0.7;
          if (btnD) target += MAX_SPEED * BOOST_MULT;
          p.speed += (target - p.speed) * SPEED_LERP;
        }

        if (Math.abs(p.speed) > 0.05) {
          p.angle += dx * TURN_SPEED * dt * (p.speed >= 0 ? 1 : -1);
        }

        p.x = Math.max(-(ARENA - 0.6), Math.min(ARENA - 0.6, p.x + Math.sin(p.angle) * p.speed * dt));
        p.z = Math.max(-(ARENA - 0.6), Math.min(ARENA - 0.6, p.z + Math.cos(p.angle) * p.speed * dt));

        p.mesh.position.set(p.x, 0.2, p.z);
        p.mesh.rotation.y = p.angle;
      }

      // ГўвЂќв‚¬ГўвЂќв‚¬ Loop ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬
      let lastTime = performance.now();
      function animate(now) {
        const dt = Math.min((now - lastTime) / 1000, 0.05);
        lastTime = now;
        players.forEach((p) => updatePlayer(p, dt));
        renderer.render(scene, camera);
        requestAnimationFrame(animate);
      }

      window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      setupSession().catch((err) => {
        connectionStatus.textContent = `Error: ${err.message}`;
      });
      requestAnimationFrame(animate);
    </script>
  </body>
</html>
