<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Mando</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="controller-body">

    <!-- â”€â”€ Rotate-phone overlay â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ -->
    <div class="rotate-overlay" id="rotateOverlay">
      <div class="rotate-msg">
        <p class="rotate-icon">â†»</p>
        <p>Gira el telÃ©fono</p>
        <p class="rotate-sub">Usa el telÃ©fono en horizontal</p>
      </div>
    </div>

    <!-- â”€â”€ Controller layout â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ -->
    <div class="controller" id="controller">

      <!-- Player colour strip (top) -->
      <div class="color-bar" id="colorBar"></div>

      <!-- Connection status (fades after join) -->
      <div class="ctrl-status" id="ctrlStatus">Conectandoâ€¦</div>

      <!-- Left half: virtual joystick -->
      <div class="ctrl-left">
        <div class="joystick-zone" id="joystickZone">
          <div class="joystick-base">
            <div class="joystick-knob" id="joystickKnob"></div>
          </div>
        </div>
      </div>

      <!-- Right half: action buttons -->
      <div class="ctrl-right">
        <button class="ctrl-btn btn-a" id="btnA"><span class="btn-label">A</span></button>
        <button class="ctrl-btn btn-b" id="btnB"><span class="btn-label">B</span></button>
        <button class="ctrl-btn btn-c" id="btnC"><span class="btn-label">C</span></button>
        <button class="ctrl-btn btn-d" id="btnD"><span class="btn-label">D</span></button>
      </div>

    </div><!-- /controller -->

    <script>
      // â”€â”€ Room from URL â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      const params = new URLSearchParams(window.location.search);
      const roomId = (params.get("room") || "").toUpperCase();

      // â”€â”€ DOM refs â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      const rotateOverlay = document.getElementById("rotateOverlay");
      const ctrlStatus    = document.getElementById("ctrlStatus");
      const colorBar      = document.getElementById("colorBar");
      const joystickZone  = document.getElementById("joystickZone");
      const joystickKnob  = document.getElementById("joystickKnob");
      const btnAEl        = document.getElementById("btnA");
      const btnBEl        = document.getElementById("btnB");
      const btnCEl        = document.getElementById("btnC");
      const btnDEl        = document.getElementById("btnD");

      // â”€â”€ Player colours (must match index.html) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      const PLAYER_COLORS = ["#ff4444", "#4499ff", "#44ff88", "#ffcc00"];

      // â”€â”€ Joystick state â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      const JOYSTICK_RADIUS = 62; // px
      let joystickOrigin = null;
      const joystick = { dx: 0, dy: 0 };

      // â”€â”€ Button state â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      let btnA = false;
      let btnB = false;
      let btnC = false;
      let btnD = false;

      // â”€â”€ Connection â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      let connected  = false;
      let playerSlot = -1;
      let sendCount = 0;
      let lastInputSignature = "";

      function dlog(...args) {
        console.log("[PHONE]", ...args);
      }

      // â”€â”€ Orientation guard â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      function checkOrientation() {
        const landscape = window.innerWidth > window.innerHeight;
        rotateOverlay.classList.toggle("hidden", landscape);
      }
      checkOrientation();
      window.addEventListener("resize", checkOrientation);
      screen.orientation?.addEventListener("change", checkOrientation);

      // â”€â”€ WebSocket â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      const wsProto = location.protocol === "https:" ? "wss" : "ws";
      const socket  = new WebSocket(`${wsProto}://${location.host}`);
      dlog("boot", { roomId, host: location.host, proto: wsProto });

      socket.addEventListener("open", () => {
        dlog("ws open", { readyState: socket.readyState });
        if (!roomId) {
          ctrlStatus.textContent = "URL invÃ¡lida â€” falta cÃ³digo de sala";
          dlog("missing roomId in URL");
          return;
        }
        socket.send(JSON.stringify({ type: "join", role: "phone", roomId }));
        dlog("join sent", { roomId });
        ctrlStatus.textContent = "UniÃ©ndoseâ€¦";
      });

      socket.addEventListener("message", (event) => {
        const msg = JSON.parse(event.data);
        dlog("ws message", msg.type, msg);

        if (msg.type === "joined") {
          connected  = true;
          playerSlot = msg.playerSlot;
          const color = PLAYER_COLORS[playerSlot] || "#ffffff";
          colorBar.style.background = color;
          colorBar.style.display = "block";
          ctrlStatus.textContent = `Jugador ${playerSlot + 1}`;
          ctrlStatus.style.color = color;
          setTimeout(() => { ctrlStatus.style.opacity = "0"; }, 2200);
        }

        if (msg.type === "error") {
          ctrlStatus.textContent = msg.message;
          ctrlStatus.style.opacity = "1";
        }
      });

      socket.addEventListener("close", () => {
        connected = false;
        dlog("ws close", { readyState: socket.readyState });
        ctrlStatus.textContent = "Desconectado â€” recarga la pÃ¡gina";
        ctrlStatus.style.opacity = "1";
      });

      socket.addEventListener("error", (err) => {
        dlog("ws error", err?.message || "transport error");
      });

      // â”€â”€ Joystick touch handling â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      function resetKnob() {
        joystickOrigin = null;
        joystick.dx = 0;
        joystick.dy = 0;
        joystickKnob.style.transform = "translate(-50%, -50%)";
      }

      function updateJoystick(cx, cy) {
        if (!joystickOrigin) return;
        let dx = cx - joystickOrigin.x;
        let dy = -(cy - joystickOrigin.y); // invert Y: up = positive
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist > JOYSTICK_RADIUS) {
          dx = (dx / dist) * JOYSTICK_RADIUS;
          dy = (dy / dist) * JOYSTICK_RADIUS;
        }
        joystick.dx = dx / JOYSTICK_RADIUS;
        joystick.dy = dy / JOYSTICK_RADIUS;
        joystickKnob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${-dy}px))`;
      }

      joystickZone.addEventListener("touchstart", (e) => {
        e.preventDefault();
        const t = e.changedTouches[0];
        joystickOrigin = { x: t.clientX, y: t.clientY };
        updateJoystick(t.clientX, t.clientY);
      }, { passive: false });

      joystickZone.addEventListener("touchmove", (e) => {
        e.preventDefault();
        updateJoystick(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
      }, { passive: false });

      joystickZone.addEventListener("touchend",    (e) => { e.preventDefault(); resetKnob(); }, { passive: false });
      joystickZone.addEventListener("touchcancel", (e) => { e.preventDefault(); resetKnob(); }, { passive: false });

      // â”€â”€ Button touch handling â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      function bindBtn(el, setter) {
        const id = el.id;
        const press = (e) => {
          e.preventDefault();
          setter(true);
          el.classList.add("pressed");
          dlog("press", id);
        };
        const release = (e) => {
          e.preventDefault();
          setter(false);
          el.classList.remove("pressed");
          dlog("release", id);
        };

        el.addEventListener("touchstart", press, { passive: false });
        el.addEventListener("touchend", release, { passive: false });
        el.addEventListener("touchcancel", release, { passive: false });
        el.addEventListener("mousedown", press);
        el.addEventListener("mouseup", release);
        el.addEventListener("mouseleave", release);
      }
      bindBtn(btnAEl, (v) => { btnA = v; });
      bindBtn(btnBEl, (v) => { btnB = v; });
      bindBtn(btnCEl, (v) => { btnC = v; });
      bindBtn(btnDEl, (v) => { btnD = v; });

      // â”€â”€ Input loop @ ~30 fps â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      setInterval(() => {
        if (!connected || socket.readyState !== WebSocket.OPEN) return;
        const payload = {
          type: "input",
          dx: joystick.dx,
          dy: 0,
          btnA,
          btnB,
          btnC,
          btnD,
        };
        socket.send(JSON.stringify(payload));

        sendCount += 1;
        const signature = `${btnA}${btnB}${btnC}${btnD}`;
        if (signature !== lastInputSignature) {
          dlog("input state", payload);
          lastInputSignature = signature;
        } else if (sendCount % 30 === 0) {
          dlog("input heartbeat", payload);
        }
      }, 33);
    </script>
  </body>
</html>
